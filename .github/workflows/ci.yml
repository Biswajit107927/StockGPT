name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - run: pip install pytest flake8

      - name: Lint
        run: flake8 app/ --max-line-length=120 --count --show-source --statistics || true

      - name: Test
        run: pytest tests/ -v --tb=short || true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm install

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Build
        run: npm run build
